name: Build Mac App

on:
  push:
    branches: [ main, master ] # سيعمل التجميع تلقائياً عند رفع الكود
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً بضغطة زر

jobs:
  build-mac:
    runs-on: macos-latest # هنا نطلب من جيتهاب تشغيل سيرفر ماك حقيقي

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 python-pptx Pillow pyinstaller

    - name: Build Application with PyInstaller
      run: |
        python setup.py

    - name: Upload Mac App Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GifToPptx-Mac-App
        path: dist/GifToPptx.app